      function updateNavbarCta(root = document) {
        const buttons = [];
        if (root.matches && root.matches("button")) {
          buttons.push(root);
        }
        if (root.querySelectorAll) {
          buttons.push(...root.querySelectorAll("button"));
        }

        buttons.forEach(function (button) {
          const label = button.textContent.trim();
          if (label === "Dashboard") {
            button.remove();
            return;
          }
          if (label === "Diagnóstico" || label === "Diagnóstico →") {
            button.textContent = "Diagnóstico Gratuito →";
          }
        });
      }

      function updateNavbarSocial(root = document) {
        const links = [];
        if (root.matches && root.matches('a[href="https://www.instagram.com/clicka.ia"]')) {
          links.push(root);

        if (root.querySelectorAll) {
          links.push(...root.querySelectorAll('a[href="https://www.instagram.com/clicka.ia"]'));
        }

        links.forEach(function (link) {
          const isDesktopNavbar = link.classList.contains("w-8") && link.classList.contains("h-8");

    <script type="text/javascript">
      function initCal() {
        if (window.Cal) return;
        (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
        Cal("init", "site", {origin:"https://app.cal.com"});
        Cal.config = Cal.config || {};
        Cal.config.forwardQueryParams = true;
      }

      function mountCal() {
        const section = document.getElementById("lp-form");
        if (!section || document.getElementById("my-cal-inline-site")) return;
        initCal();

        section.querySelectorAll("form, .solo-calendar-owner, .mb-3").forEach(function(el) {
          let node = el;
          while (node.parentElement && node.parentElement !== section && node.parentElement.children.length === 1) {
            node = node.parentElement;
          }
          node.remove();
        });

        Array.from(section.querySelectorAll("*")).forEach(function(el) {
          if (el.children.length === 0 && /Reunião de 30 min|Você sai com clareza/i.test(el.textContent)) {
            el.closest("p, span, div") && el.closest("p, span, div").remove();
          }
        });

        const div = document.createElement("div");
        div.id = "my-cal-inline-site";
        section.appendChild(div);
        Cal.ns.site("inline", {
          elementOrSelector: "#my-cal-inline-site",
          config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
          calLink: "whojuliooliveira/site",
        });
        Cal.ns.site("ui", {
          "hideEventTypeDetails": false,
          "layout": "month_view",
          "cssVarsPerTheme": {
            "dark": {
              "cal-brand": "#2563eb",
              "cal-brand-emphasis": "#1d4ed8",
              "cal-brand-text": "#ffffff"
            }
          }
        });
      }

      function observeCalSection() {
        const section = document.getElementById("lp-form");
        if (!section) return;
        if (!("IntersectionObserver" in window)) return;
        const observer = new IntersectionObserver(function (entries) {
          if (!entries.some(function (entry) { return entry.isIntersecting; })) return;
          observer.disconnect();
          mountCal();
        }, { rootMargin: "1200px 0px" });
        observer.observe(section);
      }

      function scheduleCalObserver() {
        setTimeout(observeCalSection, 500);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", scheduleCalObserver, { once: true });
      } else {
        scheduleCalObserver();
      }

      document.addEventListener("click", function (event) {
        if (!event.target.closest("[data-scroll-lp], [data-rupto-scroll]")) return;
        mountCal();
      });
    </script>
