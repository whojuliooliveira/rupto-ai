    <script type="text/javascript">

      if (window.location.pathname === "/mentoria") {
        window.location.replace("/");
      }

      function applyNewSiteCopy() {
        const sections = Array.from(document.querySelectorAll("section"));
        const sourceHero = sections.find(function (section) {
          return /DIAGNÓSTICO OPERACIONAL/.test(section.textContent);
        });
        if (!sourceHero || document.documentElement.dataset.newCopyApplied === "true") return;
        document.documentElement.dataset.newCopyApplied = "true";

        const findSection = function (pattern) {
          return sections.find(function (section) { return pattern.test(section.textContent); });
        };
        const replaceLeaf = function (root, oldText, newText) {
          if (!root) return;
          Array.from(root.querySelectorAll("*")).forEach(function (element) {
            if (element.children.length === 0 && element.textContent.trim() === oldText) {
              element.textContent = newText;
            }
          });
        };

        const hero = sourceHero;
        if (hero && hero.dataset.copyVersion !== "commercial-v1") {
          hero.dataset.copyVersion = "commercial-v1";
          hero.innerHTML = [
            '<div class="new-hero-content">',
            '<p class="new-hero-eyebrow">DIAGNÓSTICO COMERCIAL · IA APLICADA A VENDAS E CRESCIMENTO</p>',
            '<h1 class="new-hero-title">Sua empresa vende, mas perde venda todo dia por falta de estrutura.</h1>',
            '<p class="new-hero-copy">Identificamos onde sua operação comercial está perdendo venda e usamos IA pra resolver, começando pelo gargalo que mais custa dinheiro.</p>',
            '<button class="new-primary-cta" type="button" data-scroll-lp>Agendar Diagnóstico</button>',
            '<p class="new-hero-support">Reunião de 25 min · Você sai sabendo exatamente onde está perdendo venda</p>',
            '</div>'
          ].join("");
        }

        [
          /EMPRESAS QUE JÁ PASSARAM PELO DIAGNÓSTICO RUPTO AI/,
          /CASE REAL/,
          /IA \+ Humano é melhor que só humano/,
          /RESULTADOS REAIS/
        ].forEach(function (pattern) {
          const oldSection = findSection(pattern);
          if (oldSection) oldSection.remove();
        });

        const problem = findSection(/A maioria das empresas está usando IA do jeito errado/);
        if (problem) {
          const heading = problem.querySelector("h2");
          if (heading) heading.textContent = "A maioria das empresas implementa IA do jeito errado.";
          replaceLeaf(problem,
            "Elas contratam um chatbot. Assinam uma ferramenta nova. Automatizam um processo aleatório. E não muda nada.",
            "Compra um chatbot. Assina uma ferramenta nova. Automatiza um processo aleatório. E não muda nada.");
          replaceLeaf(problem, "Sabe por quê?", "Sabe por quê?");

            "Você sente que está apagando incêndios o dia inteiro, sem tempo para pensar estrategicamente.",

      function updateNavbarCta(root = document) {

        if (root.querySelectorAll) {
          buttons.push(...root.querySelectorAll("button"));
        }

        buttons.forEach(function (button) {
          const label = button.textContent.trim();
          if (label === "Dashboard") {
            button.remove();
            return;
          }
          if (label === "Diagnóstico" || label === "Diagnóstico →") {
            button.textContent = "Diagnóstico Gratuito →";
          }
        });
      }

        if (root.querySelectorAll) {
          links.push(...root.querySelectorAll('a[href="https://www.instagram.com/clicka.ia"]'));

        links.forEach(function (link) {
